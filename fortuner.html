<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortuner Car Leasing - Road Relic Rental</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #e0e6ed;
            font-family: Arial, sans-serif;
        }
        .header {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            padding: 10px;
            background-color: #333;
            color: white;
        }
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }
        .car-item {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            background: white;
            flex-wrap: wrap;
            position: relative;
        }
        .car-item img {
            width: 300px;
            height: 200px;
            border-radius: 8px;
            object-fit: cover;
        }
        .car-details {
            padding-left: 20px;
            flex-grow: 1; 
        }
        .book-now-btn, .confirm-btn, .cancel-btn, .back-btn {
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
            color: white;
        }
        .book-now-btn { background: #28a745; }
        .book-now-btn:hover { background: #218838; }
        .confirm-btn { background: #28a745; }
        .cancel-btn { background: red; }
        .back-btn { background: #007bff; display: block; margin: 20px auto; text-align: center; }
        .booking-form {
            display: none;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            z-index: 10;
        }
        .map-container {
            width: 100%;
            height: 200px;
            margin-top: 10px;
        }
    </style>
    
</head>
<body>
    <div class="header">Toyota Fortuner Leasing - Road Relic Rental</div>
    <h2 class="title" style="text-align:center;">Power, Prestige & Performance — Lease the Fortuner Today!</h2>

    <div class="gallery">
        <script>
                const cars = [
                    { name: "Fortuner 4x2 Petrol", engine: "2.7L Petrol", transmission: "Automatic", rent: "₹45,000/month", seats: 7, image: "f1.jpeg" },
                    { name: "Fortuner 4x2 Diesel", engine: "2.8L Diesel", transmission: "Manual", rent: "₹48,000/month", seats: 7, image: "f2.jpeg" },
                    { name: "Fortuner 4x4 Diesel", engine: "2.8L Diesel", transmission: "Automatic", rent: "₹52,000/month", seats: 7, image: "f3.jpeg" },
                    { name: "Fortuner GR-S", engine: "2.8L Diesel Sport", transmission: "Automatic", rent: "₹60,000/month", seats: 7, image: "f4.jpeg" },
                    { name: "Fortuner Legender", engine: "2.8L Diesel Premium", transmission: "Automatic", rent: "₹58,000/month", seats: 7, image: "f5.jpeg" }
                ];

            for (let i = 0; i <= 5; i++) {
                let car = cars[i % cars.length];
                document.write(`
                    <div class="car-item">
                        <img src="f${(i % 5) + 1}.jpeg" alt="${car.name}">
                        <div class="car-details">
                            <h3>${car.name}</h3>
                            <p><strong>Engine:</strong> ${car.engine}</p>
                            <p><strong>Transmission:</strong> ${car.transmission}</p>
                            <p><strong>Leasing Rate:</strong> ${car.rent}</p>
                            <button class="book-now-btn" onclick="showBookingForm('car${i}')">Lease Now</button>
                            <div id="car${i}" class="booking-form">
                                <h4>Leasing Details</h4>
                                <form>
                                    <label>Full Name:</label>
                                    <input type="text" required><br>

                                    <label>Email:</label>
                                    <input type="email" required><br>

                                    <label>Phone:</label>
                                    <input type="tel" required><br>

                                    <label>Select Leasing Duration:</label>
                                    <select>
                                        <option>1 Month</option>
                                        <option>3 Months</option>
                                        <option>6 Months</option>
                                        <option>1 Year</option>
                                    </select><br>

                                    <h4>Payment Options</h4>
                                    <input type="radio" name="payment${i}" value="Credit Card"> Credit Card
                                    <input type="radio" name="payment${i}" value="Debit Card"> Debit Card
                                    <input type="radio" name="payment${i}" value="UPI"> UPI
                                    <input type="radio" name="payment${i}" value="Net Banking"> Net Banking

                                    <h4>Fingerprint Verification</h4>
                                    <button type="button" onclick="captureFingerprint(${i})">Scan Fingerprint</button>
                                    <p id="fingerprint-status${i}">Fingerprint not verified</p>

                                    <h4>Car Location</h4>
                                    <div id="car${i}-map" class="map-container"></div>

                                    <button class="confirm-btn">Confirm Lease</button>
                                    <button class="cancel-btn" onclick="showBookingForm('car${i}')">Cancel</button>
                                </form>
                            </div>
                        </div>
                    </div>
                `);
            }

            function showBookingForm(id) {
                let forms = document.querySelectorAll('.booking-form');
                forms.forEach(form => form.style.display = "none");
                document.getElementById(id).style.display = "block";
            }

            function simulateFaceAuth(carId) {
  setTimeout(() => {
    const status = document.getElementById(`face-status-${carId}`);
    status.textContent = "Face authenticated successfully!";
    status.style.color = "green";
    
    // Add alert box
    alert("Face authentication is successful!");
  }, 1000);
}
        </script>
    </div>

    <button class="back-btn" onclick="window.location.href='index.html'">Back to Home</button>
    <div class="footer" style="text-align:center;">&copy; 2025 Road Relic Rental. All Rights Reserved.</div>
</body>
</html>
