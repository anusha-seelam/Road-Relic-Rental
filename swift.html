<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Relic Rental</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>
    <style>
        body {
            background-color: #e0e6ed;
            font-family: Arial, sans-serif;
        }

        .header {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            padding: 10px;
            background-color: #333;
            color: white;
        }

        .slogan {
            text-align: center;
            font-size: 20px;
            font-style: strong;
            margin-top: 10px;
            color: white;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .car-item {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            background: white;
            position: relative;
            flex-wrap: wrap;
        }

        .car-item img {
            width: 300px;
            height: 200px;
            border-radius: 8px;
            object-fit: cover;
        }

        .car-details {
            padding-left: 20px;
            flex-grow: 1;
        }

        .booking-form {
            display: none;
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #f9f9f9;
            width: 100%;
        }

        .map-container {
            width: 100%;
            height: 200px;
            margin-top: 10px;
        }

        .book-now-btn, .home-btn {
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            margin-top: 10px;
            background: #28a745;
            color: white;
        }

        .book-now-btn:hover, .home-btn:hover {
            background: #218838;
        }

        .cancel-btn {
            background: #dc3545;
        }

        .cancel-btn:hover {
            background: #c82333;
        }
    </style>
    <script>
        function showBookingForm(id) {
            let bookingForm = document.getElementById(id);
            bookingForm.style.display = bookingForm.style.display === "none" ? "block" : "none";
            if (bookingForm.style.display === "block") {
                initMap(id + "-map");
            }
        }

        function initMap(mapId) {
            if (!navigator.geolocation) {a
                alert("Geolocation is not supported by your browser");
                return;
            }

            navigator.geolocation.getCurrentPosition(position => {
                let map = new google.maps.Map(document.getElementById(mapId), {
                    center: { lat: position.coords.latitude, lng: position.coords.longitude },
                    zoom: 15
                });

                new google.maps.Marker({
                    position: { lat: position.coords.latitude, lng: position.coords.longitude },
                    map: map,
                    title: "Car Location"
                });
            }, () => {
                alert("Unable to retrieve location");
            });
        }
        function simulateFaceAuth(carId) {
  setTimeout(() => {
    const status = document.getElementById(`face-status-${carId}`);
    status.textContent = "Face authenticated successfully!";
    status.style.color = "green";
    
    // Add alert box
    alert("Face authentication is successful!");
  }, 1000);
}



    </script>
</head>

                                    </select>

                                    <form class="p-4 border rounded bg-light">

    <div class="form-check mb-4">

    <h4>Face Authentication</h4>
    <button type="button" onclick="simulateFaceAuth('car${i}')">Authenticate Face</button>
 <p id="face-status-car${i}" class="text-muted">Face not authenticated</p>

    <div id="car${i}-map" class="map-container mb-4" style="height: 200px; border: 1px solid #ccc;"></div>

    <div class="d-flex gap-3 mb-4">

</form>

<!-- Feedback Section -->
<div class="feedback-section p-4 border rounded bg-light mt-4">

    <div class="star-rating fs-3 text-warning">
        <span class="star" onclick="setRating(this, 'car${i}')">★</span>

</div>

    

    <!-- Review Text Box -->
    <textarea id="review-car${i}" rows="3" placeholder="Write your review here..."></textarea><br>

    <!-- Display Reviews -->
    <div id="reviews-car${i}" class="reviews">
        
    </div>
    
</div>

                        </div>                      
                    </div>
                `);
            }
        </script>
    </div>

    <button class="home-btn" onclick="window.location.href='index.html'">Back to Home</button><br><br>

</body>
</html>
